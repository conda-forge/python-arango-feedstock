schema_version: 1

context:
  name: python-arango
  version: "8.3.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 312ca279b5cf2e291f1928a6a6c9bc7e36ff55e732c1912461079526162d3290

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}
    - urllib3 >=1.26.0
    - requests
    - requests-toolbelt
    - pyjwt >=2.10.0
    - packaging >=23.1

tests:
  - python:
      imports:
        - arango
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python Driver for ArangoDB
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/ArangoDB-Community/python-arango
  repository: https://github.com/ArangoDB-Community/python-arango
  documentation: https://python-driver-for-arangodb.readthedocs.io/

extra:
  recipe-maintainers:
    - xylar
    - carlodri
    - aMahanna
    - xylar
